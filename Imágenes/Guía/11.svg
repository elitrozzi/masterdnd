<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#1e1b4b"/><stop offset="1" stop-color="#312e81"/></linearGradient>
    <radialGradient id="glowL" cx="35%" cy="50%" r="30%"><stop offset="0" stop-color="#818cf8" stop-opacity="0.3"/><stop offset="1" stop-color="transparent"/></radialGradient>
    <radialGradient id="glowR" cx="65%" cy="50%" r="30%"><stop offset="0" stop-color="#a78bfa" stop-opacity="0.3"/><stop offset="1" stop-color="transparent"/></radialGradient>
  </defs>
  <rect width="800" height="420" fill="url(#bg)"/>
  <rect width="800" height="420" fill="url(#glowL)"/>
  <rect width="800" height="420" fill="url(#glowR)"/>
  <!-- Left orb — one class -->
  <circle cx="290" cy="210" r="80" fill="#1e1b4b" stroke="#818cf8" stroke-width="2" opacity="0.8"/>
  <circle cx="290" cy="210" r="60" fill="#3730a3" opacity="0.4"/>
  <circle cx="290" cy="210" r="35" fill="#4f46e5" opacity="0.5"/>
  <!-- Sword in left orb -->
  <line x1="290" y1="175" x2="290" y2="245" stroke="#c7d2fe" stroke-width="4" stroke-linecap="round" opacity="0.8"/>
  <line x1="275" y1="195" x2="305" y2="195" stroke="#c7d2fe" stroke-width="3" stroke-linecap="round" opacity="0.7"/>
  <polygon points="290,172 286,182 294,182" fill="#e0e7ff" opacity="0.9"/>
  <!-- Right orb — other class -->
  <circle cx="510" cy="210" r="80" fill="#1e1b4b" stroke="#a78bfa" stroke-width="2" opacity="0.8"/>
  <circle cx="510" cy="210" r="60" fill="#4c1d95" opacity="0.4"/>
  <circle cx="510" cy="210" r="35" fill="#7c3aed" opacity="0.5"/>
  <!-- Star/magic in right orb -->
  <circle cx="510" cy="210" r="18" fill="#c084fc" opacity="0.3"/>
  <circle cx="510" cy="210" r="9" fill="#e879f9" opacity="0.6"/>
  <line x1="510" y1="190" x2="510" y2="230" stroke="#f0abfc" stroke-width="2" opacity="0.6"/>
  <line x1="490" y1="210" x2="530" y2="210" stroke="#f0abfc" stroke-width="2" opacity="0.6"/>
  <line x1="496" y1="196" x2="524" y2="224" stroke="#f0abfc" stroke-width="1.5" opacity="0.4"/>
  <line x1="524" y1="196" x2="496" y2="224" stroke="#f0abfc" stroke-width="1.5" opacity="0.4"/>
  <!-- Connection arc between orbs -->
  <path d="M 370 210 Q 400 170 430 210" fill="none" stroke="#818cf8" stroke-width="2" stroke-dasharray="5 4" opacity="0.6"/>
  <path d="M 370 210 Q 400 250 430 210" fill="none" stroke="#a78bfa" stroke-width="2" stroke-dasharray="5 4" opacity="0.6"/>
  <!-- Plus sign in center -->
  <circle cx="400" cy="210" r="18" fill="#312e81" stroke="#818cf8" stroke-width="1.5" opacity="0.9"/>
  <line x1="392" y1="210" x2="408" y2="210" stroke="#c7d2fe" stroke-width="2.5" stroke-linecap="round" opacity="0.9"/>
  <line x1="400" y1="202" x2="400" y2="218" stroke="#c7d2fe" stroke-width="2.5" stroke-linecap="round" opacity="0.9"/>
  <!-- Ambient dots -->
  <circle cx="160" cy="110" r="2" fill="#818cf8" opacity="0.3"/>
  <circle cx="640" cy="110" r="2" fill="#a78bfa" opacity="0.3"/>
  <circle cx="150" cy="310" r="2" fill="#818cf8" opacity="0.25"/>
  <circle cx="650" cy="320" r="2" fill="#a78bfa" opacity="0.25"/>
</svg>
