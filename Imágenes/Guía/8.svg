<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#12052a"/><stop offset="1" stop-color="#2e1065"/></linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%"><stop offset="0" stop-color="#7c3aed" stop-opacity="0.3"/><stop offset="1" stop-color="transparent"/></radialGradient>
  </defs>
  <rect width="800" height="420" fill="url(#bg)"/>
  <rect width="800" height="420" fill="url(#glow)"/>
  <!-- Magic circle rings -->
  <circle cx="400" cy="210" r="165" fill="none" stroke="#7c3aed" stroke-width="1.5" opacity="0.35" stroke-dasharray="8 6"/>
  <circle cx="400" cy="210" r="125" fill="none" stroke="#a855f7" stroke-width="1" opacity="0.3"/>
  <circle cx="400" cy="210" r="85" fill="none" stroke="#7c3aed" stroke-width="1" opacity="0.25"/>
  <!-- Rune lines -->
  <line x1="400" y1="45" x2="400" y2="375" stroke="#a855f7" stroke-width="1" opacity="0.2"/>
  <line x1="235" y1="127" x2="565" y2="293" stroke="#a855f7" stroke-width="1" opacity="0.2"/>
  <line x1="235" y1="293" x2="565" y2="127" stroke="#a855f7" stroke-width="1" opacity="0.2"/>
  <!-- Stars at intersections -->
  <circle cx="400" cy="45" r="4" fill="#c084fc" opacity="0.7"/>
  <circle cx="400" cy="375" r="4" fill="#c084fc" opacity="0.7"/>
  <circle cx="235" cy="127" r="4" fill="#a855f7" opacity="0.7"/>
  <circle cx="565" cy="127" r="4" fill="#a855f7" opacity="0.7"/>
  <circle cx="235" cy="293" r="4" fill="#a855f7" opacity="0.7"/>
  <circle cx="565" cy="293" r="4" fill="#a855f7" opacity="0.7"/>
  <!-- Center orb -->
  <circle cx="400" cy="210" r="30" fill="#4c1d95" opacity="0.8"/>
  <circle cx="400" cy="210" r="20" fill="#7c3aed" opacity="0.7"/>
  <circle cx="400" cy="210" r="10" fill="#c084fc" opacity="0.9"/>
  <circle cx="393" cy="203" r="4" fill="white" opacity="0.5"/>
  <!-- Floating sparkles -->
  <circle cx="280" cy="160" r="3" fill="#e879f9" opacity="0.5"/>
  <circle cx="520" cy="160" r="2" fill="#c084fc" opacity="0.4"/>
  <circle cx="300" cy="280" r="2" fill="#a855f7" opacity="0.4"/>
  <circle cx="500" cy="280" r="3" fill="#e879f9" opacity="0.5"/>
  <circle cx="180" cy="210" r="2" fill="#7c3aed" opacity="0.3"/>
  <circle cx="620" cy="210" r="2" fill="#7c3aed" opacity="0.3"/>
</svg>