<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#042a2b"/><stop offset="1" stop-color="#0d4a4b"/></linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%"><stop offset="0" stop-color="#0d9488" stop-opacity="0.25"/><stop offset="1" stop-color="transparent"/></radialGradient>
  </defs>
  <rect width="800" height="420" fill="url(#bg)"/>
  <rect width="800" height="420" fill="url(#glow)"/>
  <!-- Status rings -->
  <circle cx="400" cy="210" r="155" fill="none" stroke="#0d9488" stroke-width="1.5" opacity="0.3" stroke-dasharray="6 5"/>
  <circle cx="400" cy="210" r="110" fill="none" stroke="#14b8a6" stroke-width="1" opacity="0.25"/>
  <!-- Skull icon -->
  <ellipse cx="400" cy="195" rx="52" ry="48" fill="#0f3b3c" stroke="#0d9488" stroke-width="2" opacity="0.9"/>
  <ellipse cx="400" cy="195" rx="44" ry="40" fill="#0d9488" opacity="0.15"/>
  <!-- Eye sockets -->
  <ellipse cx="382" cy="188" rx="10" ry="11" fill="#042a2b" opacity="0.9"/>
  <ellipse cx="418" cy="188" rx="10" ry="11" fill="#042a2b" opacity="0.9"/>
  <!-- Glow in eyes -->
  <ellipse cx="382" cy="188" rx="5" ry="6" fill="#2dd4bf" opacity="0.7"/>
  <ellipse cx="418" cy="188" rx="5" ry="6" fill="#2dd4bf" opacity="0.7"/>
  <!-- Nose hollow -->
  <polygon points="400,203 394,214 406,214" fill="#042a2b" opacity="0.8"/>
  <!-- Teeth -->
  <rect x="381" y="220" width="7" height="9" rx="2" fill="#042a2b" opacity="0.8"/>
  <rect x="392" y="220" width="7" height="10" rx="2" fill="#042a2b" opacity="0.8"/>
  <rect x="403" y="220" width="7" height="9" rx="2" fill="#042a2b" opacity="0.8"/>
  <!-- Condition bubbles -->
  <circle cx="245" cy="145" r="26" fill="#0d9488" opacity="0.15" stroke="#0d9488" stroke-width="1" opacity="0.4"/>
  <circle cx="555" cy="145" r="26" fill="#0d9488" opacity="0.15" stroke="#14b8a6" stroke-width="1" opacity="0.4"/>
  <circle cx="245" cy="275" r="26" fill="#0d9488" opacity="0.15" stroke="#0d9488" stroke-width="1" opacity="0.4"/>
  <circle cx="555" cy="275" r="26" fill="#0d9488" opacity="0.15" stroke="#14b8a6" stroke-width="1" opacity="0.4"/>
  <!-- Condition icons simplified -->
  <line x1="237" y1="145" x2="253" y2="145" stroke="#2dd4bf" stroke-width="2" opacity="0.6" stroke-linecap="round"/>
  <line x1="245" y1="137" x2="245" y2="153" stroke="#2dd4bf" stroke-width="2" opacity="0.6" stroke-linecap="round"/>
  <line x1="547" y1="137" x2="563" y2="153" stroke="#2dd4bf" stroke-width="2" opacity="0.6" stroke-linecap="round"/>
  <line x1="563" y1="137" x2="547" y2="153" stroke="#2dd4bf" stroke-width="2" opacity="0.6" stroke-linecap="round"/>
  <circle cx="245" cy="275" r="10" fill="none" stroke="#2dd4bf" stroke-width="1.5" opacity="0.6"/>
  <circle cx="245" cy="275" r="4" fill="#2dd4bf" opacity="0.4"/>
  <path d="M 547 270 Q 555 263 563 270 Q 555 282 547 270 Z" fill="#2dd4bf" opacity="0.5"/>
  <!-- Ambient dots -->
  <circle cx="150" cy="100" r="2" fill="#0d9488" opacity="0.3"/>
  <circle cx="660" cy="120" r="2" fill="#14b8a6" opacity="0.3"/>
  <circle cx="130" cy="320" r="2" fill="#0d9488" opacity="0.25"/>
  <circle cx="670" cy="310" r="2" fill="#14b8a6" opacity="0.25"/>
</svg>
